name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Release
        run: cargo build --release

      - name: Prepare Binary
        shell: pwsh
        run: |
          mkdir dist
          copy target\release\LazyWSL.exe dist\lazywsl-windows-x86_64.exe

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*